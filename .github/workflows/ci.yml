# .github/workflows/ci.yml
name: nheri_simcenter CI

on:
  push:
  pull_request:
  release:
    types: [created]

jobs:
  install:
    name: ${{ matrix.extra }} on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
        extra: [quofem, eeuq, pbe, weuq, hydrouq, r2d]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show platform info
        run: python -c "import platform; print('Python', platform.python_version(), 'on', platform.system(), platform.machine())"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install nheri_simcenter[${{ matrix.extra }}]
        run: pip install ".[${{ matrix.extra }}]"

      - name: Verify installed environment is consistent
        run: pip check

      - name: Verify nheri_simcenter import
        run: python -c "import nheri_simcenter; print('nheri_simcenter', nheri_simcenter.__version__, 'installed successfully')"

      - name: Show installed packages
        if: always()
        run: pip list

  deploy_to_pypi:
    name: Deploy to PyPI
    if: github.event_name == 'release' && github.event.action == 'created'
    needs: install
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine
      - name: Build package
        run: python -m build
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
